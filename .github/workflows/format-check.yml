name: Format Guardrails

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.base_ref == 'main' }}

jobs:
  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install formatters
        run: |
          python -m pip install --upgrade pip
          pip install black isort autoflake

      - name: Check formatting with autoflake, isort, and black
        run: |
          PYTHON_FILES=$(find . -name "*.py" -type f -not -path "*/.*" -not -name "__init__.py")

          if [ -z "$PYTHON_FILES" ]; then
            echo "No Python files to check"
            exit 0
          fi

          echo "$PYTHON_FILES" | xargs autoflake --remove-all-unused-imports --expand-star-imports --ignore-init-module-imports --check-diff
          echo "$PYTHON_FILES" | xargs isort --profile black --skip __init__.py --force-alphabetical-sort-within-sections --order-by-type --lines-after-imports=2 --check-only
          echo "$PYTHON_FILES" | xargs black --check
