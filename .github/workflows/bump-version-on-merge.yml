name: Bump Version on Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: |
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'release:major') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:patch')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bump tool
        run: pip install bump-my-version

      - name: Set up Git user
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Determine bump type
        id: bump
        shell: bash
        run: |
          if [[ "${{ join(github.event.pull_request.labels.*.name, ' ') }}" == *"release:major"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "${{ join(github.event.pull_request.labels.*.name, ' ') }}" == *"release:minor"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "${{ join(github.event.pull_request.labels.*.name, ' ') }}" == *"release:patch"* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No release label found; exiting."
            exit 1
          fi

      - name: Bump version and create tag
        run: bump-my-version bump ${{ steps.bump.outputs.type }}
        env:
          BMV_ALLOW_DIRTY: "true"

      - name: Push commit and tag
        run: git push --follow-tags
